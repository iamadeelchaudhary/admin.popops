<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PopOps | Users</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Sora", "sans-serif"] },
            colors: {
              electric: "#2563EB",
              surface: "#FFFFFF",
              background: "#F8FAFC",
              onSurface: "#0F172A",
              outline: "#64748B",
            },
          },
        },
      };
    </script>
  </head>
  <body>
    <div class="bg-mesh"></div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo-mark"><i class="fa-solid fa-bolt"></i></div>
        <div class="logo-text">PopOps<br /><span>Dashboard</span></div>
      </div>
      <nav class="sidebar-nav">
        <div class="nav-section-title">Main</div>
        <a href="/dashboard.html" class="nav-link">
          <i class="fa-solid fa-grid-2"></i>
          Overview
        </a>
        <a href="/users.html" class="nav-link active">
          <i class="fa-solid fa-users"></i>
          Users
        </a>
        <a href="/projects.html" class="nav-link">
          <i class="fa-solid fa-layer-group"></i>
          Projects
        </a>
        <a href="/reports.html" class="nav-link">
          <i class="fa-solid fa-triangle-exclamation"></i>
          Error Reports
        </a>
      </nav>
      <div class="sidebar-footer">
        <button id="logout-btn" class="user-mini" style="width: 100%">
          <div class="user-mini-avatar">
            <i
              class="fa-solid fa-right-from-bracket"
              style="font-size: 13px"
            ></i>
          </div>
          <div class="user-mini-info">
            <div class="user-mini-name">Sign Out</div>
            <div class="user-mini-role">End admin session</div>
          </div>
        </button>
      </div>
    </aside>

    <div class="main-wrapper">
      <header class="top-header">
        <div class="header-left">
          <button class="menu-toggle" id="menuToggle">
            <i class="fa-solid fa-bars-staggered"></i>
          </button>
          <div>
            <div class="page-title">All Users</div>
            <div class="page-subtitle">
              Manage your user base and subscriptions
            </div>
          </div>
        </div>
        <div class="header-right">
          <div class="search-wrap">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" placeholder="Search users..." />
          </div>
          <button class="icon-btn" id="themeToggle" title="Toggle theme">
            <i class="fa-solid fa-moon"></i>
          </button>
          <button class="icon-btn" title="Notifications">
            <i class="fa-regular fa-bell"></i>
            <span class="badge-dot"></span>
          </button>
        </div>
      </header>

      <main class="content">
        <div class="card" style="animation-delay: 0.1s">
          <div class="card-header">
            <div class="card-title">
              <i
                class="fa-solid fa-database"
                style="margin-right: 8px; color: var(--brand)"
              ></i
              >Full User Database
            </div>
            <div style="display: flex; gap: 8px">
              <button class="btn btn-ghost btn-sm">
                <i class="fa-solid fa-filter" style="font-size: 10px"></i>
                Filter
              </button>
              <button class="btn btn-ghost btn-sm">
                <i class="fa-solid fa-download" style="font-size: 10px"></i>
                Export
              </button>
            </div>
          </div>
          <div class="card-body">
            <div style="overflow-x: auto">
              <table class="data-table">
                <thead>
                  <tr>
                    <th>User Details</th>
                    <th>Plan</th>
                    <th style="text-align: center">Projects</th>
                    <th>Joined</th>
                    <th style="text-align: right">Actions</th>
                  </tr>
                </thead>
                <tbody id="user-table-body">
                  <tr>
                    <td>
                      <div
                        class="skeleton"
                        style="height: 16px; width: 140px"
                      ></div>
                      <div
                        class="skeleton"
                        style="height: 12px; width: 100px; margin-top: 6px"
                      ></div>
                    </td>
                    <td>
                      <div
                        class="skeleton"
                        style="height: 28px; width: 80px; border-radius: 20px"
                      ></div>
                    </td>
                    <td style="text-align: center">
                      <div
                        class="skeleton"
                        style="
                          height: 24px;
                          width: 60px;
                          margin: 0 auto;
                          border-radius: 8px;
                        "
                      ></div>
                    </td>
                    <td>
                      <div
                        class="skeleton"
                        style="height: 16px; width: 80px"
                      ></div>
                    </td>
                    <td style="text-align: right">
                      <div
                        class="skeleton"
                        style="
                          height: 32px;
                          width: 32px;
                          margin-left: auto;
                          border-radius: 10px;
                        "
                      ></div>
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <div
                        class="skeleton"
                        style="height: 16px; width: 120px"
                      ></div>
                      <div
                        class="skeleton"
                        style="height: 12px; width: 90px; margin-top: 6px"
                      ></div>
                    </td>
                    <td>
                      <div
                        class="skeleton"
                        style="height: 28px; width: 80px; border-radius: 20px"
                      ></div>
                    </td>
                    <td style="text-align: center">
                      <div
                        class="skeleton"
                        style="
                          height: 24px;
                          width: 60px;
                          margin: 0 auto;
                          border-radius: 8px;
                        "
                      ></div>
                    </td>
                    <td>
                      <div
                        class="skeleton"
                        style="height: 16px; width: 80px"
                      ></div>
                    </td>
                    <td style="text-align: right">
                      <div
                        class="skeleton"
                        style="
                          height: 32px;
                          width: 32px;
                          margin-left: auto;
                          border-radius: 10px;
                        "
                      ></div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="/src/admin.js"></script>
    <script>
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("sidebarOverlay");
      const menuToggle = document.getElementById("menuToggle");
      function toggleSidebar() {
        sidebar.classList.toggle("mobile-open");
        overlay.classList.toggle("active");
      }
      menuToggle.addEventListener("click", toggleSidebar);
      overlay.addEventListener("click", toggleSidebar);

      const themeToggle = document.getElementById("themeToggle");
      let isDark = false;
      themeToggle.addEventListener("click", () => {
        isDark = !isDark;
        document.body.setAttribute("data-theme", isDark ? "dark" : "");
        themeToggle.innerHTML = isDark
          ? '<i class="fa-solid fa-sun"></i>'
          : '<i class="fa-solid fa-moon"></i>';
      });
    </script>
  </body>
</html>
