<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PopOps | Secure Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="/src/style.css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Sora", "sans-serif"] },
            colors: {
              electric: "#2563EB",
              surface: "#FFFFFF",
              background: "#F8FAFC",
              onSurface: "#0F172A",
              outline: "#64748B",
            },
          },
        },
      };
    </script>
  </head>
  <body>
    <div class="bg-mesh"></div>

    <div class="login-page">
      <div class="login-card">
        <div class="login-logo">
          <i class="fa-solid fa-bolt"></i>
        </div>
        <h1 class="login-title">PopOps Dashboard</h1>
        <p class="login-subtitle">Admin Authentication Required</p>

        <div id="error-msg" class="error-msg hidden"></div>

        <button id="login-btn" class="login-btn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
              fill="#4285F4"
            />
            <path
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
              fill="#34A853"
            />
            <path
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
              fill="#FBBC05"
            />
            <path
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
              fill="#EA4335"
            />
          </svg>
          Sign in with Google
        </button>

        <p
          style="
            margin-top: 28px;
            font-size: 12px;
            color: var(--text-muted);
            font-family: &quot;Inter&quot;, sans-serif;
          "
        >
          <i class="fa-solid fa-shield-halved" style="margin-right: 6px"></i>
          Secure admin access only
        </p>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
