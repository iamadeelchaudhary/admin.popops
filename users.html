<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PopOps | Users</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: { sans: ["Sora", "sans-serif"] },
            colors: {
              electric: "#2563EB",
              surface: "#FFFFFF",
              background: "#F8FAFC",
              onSurface: "#0F172A",
              outline: "#64748B",
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-background font-sans text-onSurface h-screen flex overflow-hidden"
  >
    <aside class="w-64 bg-surface border-r border-slate-200 flex flex-col">
      <div class="p-6">
        <h1 class="text-2xl font-bold text-electric">
          PopOps<br /><span class="text-onSurface">Dashboard</span>
        </h1>
      </div>
      <nav class="flex-1 px-4 space-y-2 mt-4">
        <a
          href="/dashboard.html"
          class="flex items-center gap-3 px-4 py-3 text-outline hover:bg-slate-50 hover:text-onSurface rounded-xl font-semibold transition-colors"
          >Overview</a
        >
        <a
          href="/users.html"
          class="flex items-center gap-3 px-4 py-3 bg-blue-50 text-electric rounded-xl font-semibold transition-colors"
          >Users</a
        >
        <a
          href="/projects.html"
          class="flex items-center gap-3 px-4 py-3 text-outline hover:bg-slate-50 hover:text-onSurface rounded-xl font-semibold transition-colors"
          >Projects</a
        >
        <a
          href="/reports.html"
          class="flex items-center gap-3 px-4 py-3 text-outline hover:bg-slate-50 hover:text-onSurface rounded-xl font-semibold transition-colors"
          >Error Reports</a
        >
      </nav>
      <div class="p-4 border-t border-slate-200">
        <button
          id="logout-btn"
          class="w-full flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 rounded-xl font-semibold transition-colors"
        >
          Sign Out
        </button>
      </div>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
      <header class="mb-8">
        <h2 class="text-3xl font-bold">All Users</h2>
      </header>
      <div
        class="bg-surface rounded-3xl shadow-[0_4px_20px_rgb(0,0,0,0.03)] border border-slate-100 overflow-hidden"
      >
        <div class="px-6 py-5 border-b border-slate-100">
          <h3 class="text-lg font-bold">Full User Database</h3>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-left border-collapse">
            <thead>
              <tr
                class="bg-slate-50/80 text-xs text-slate-400 uppercase tracking-wider border-b border-slate-100"
              >
                <th class="px-6 py-4 font-semibold">User Details</th>
                <th class="px-6 py-4 font-semibold">Plan</th>
                <th class="px-6 py-4 font-semibold text-center">Projects</th>
                <th class="px-6 py-4 font-semibold">Joined</th>
                <th class="px-6 py-4 font-semibold text-right">Actions</th>
              </tr>
            </thead>
            <tbody id="user-table-body" class="text-sm">
              <tr class="animate-pulse border-b border-slate-50">
                <td class="px-6 py-4">
                  <div class="h-4 bg-slate-200 rounded w-32 mb-2"></div>
                  <div class="h-3 bg-slate-100 rounded w-24"></div>
                </td>
                <td class="px-6 py-4">
                  <div class="h-6 bg-slate-200 rounded-xl w-20"></div>
                </td>
                <td class="px-6 py-4 flex justify-center">
                  <div class="h-6 bg-slate-200 rounded-lg w-16 mt-2"></div>
                </td>
                <td class="px-6 py-4">
                  <div class="h-4 bg-slate-200 rounded w-20"></div>
                </td>
                <td class="px-6 py-4 flex justify-end">
                  <div class="h-8 bg-slate-200 rounded-xl w-8"></div>
                </td>
              </tr>
              <tr class="animate-pulse border-b border-slate-50">
                <td class="px-6 py-4">
                  <div class="h-4 bg-slate-200 rounded w-28 mb-2"></div>
                  <div class="h-3 bg-slate-100 rounded w-20"></div>
                </td>
                <td class="px-6 py-4">
                  <div class="h-6 bg-slate-200 rounded-xl w-20"></div>
                </td>
                <td class="px-6 py-4 flex justify-center">
                  <div class="h-6 bg-slate-200 rounded-lg w-16 mt-2"></div>
                </td>
                <td class="px-6 py-4">
                  <div class="h-4 bg-slate-200 rounded w-24"></div>
                </td>
                <td class="px-6 py-4 flex justify-end">
                  <div class="h-8 bg-slate-200 rounded-xl w-8"></div>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </main>

    <script type="module" src="/src/admin.js"></script>
  </body>
</html>
