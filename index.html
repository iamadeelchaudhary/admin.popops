<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PopOps | Secure Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              // This forces Tailwind to use Sora everywhere
              sans: ["Sora", "sans-serif"],
            },
            colors: {
              electric: "#2563EB", // Your signature Electric Blue
              surface: "#FFFFFF",
              background: "#F8FAFC", // Very light, premium slate/blue for the body
              onSurface: "#0F172A", // Deep slate for readable text
              outline: "#64748B", // Subtitle/Outline color
            },
          },
        },
      };
    </script>
  </head>
  <body
    class="bg-background h-screen flex items-center justify-center font-sans text-onSurface"
  >
    <div
      class="bg-surface p-8 rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] w-full max-w-md border border-slate-100 text-center"
    >
      <div class="mb-8">
        <h1 class="text-3xl font-bold tracking-tight text-onSurface mb-2">
          PopOps Dashboard
        </h1>
        <p class="text-sm font-normal text-outline">
          Admin Authentication Required
        </p>
      </div>

      <div
        id="error-msg"
        class="hidden mb-6 p-4 rounded-xl bg-red-50 border border-red-100 text-red-600 text-sm font-semibold"
      ></div>

      <button
        id="login-btn"
        class="w-full flex items-center justify-center gap-3 bg-electric hover:bg-blue-600 transition-colors duration-200 text-white font-semibold py-3.5 px-4 rounded-xl focus:outline-none focus:ring-4 focus:ring-blue-100"
      >
        <svg
          class="w-6 h-6 bg-white rounded-full p-1"
          viewBox="0 0 24 24"
          fill="currentColor"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4"
          />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853"
          />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05"
          />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335"
          />
        </svg>
        Sign in with Google
      </button>
    </div>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
